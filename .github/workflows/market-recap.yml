# Build + publish the daily Metals market recap page
# -----------------------------------------------------------------------------
# Generates a server-rendered /market-recap page from our own price snapshot +
# history archive and uploads it to Vimexx. Fresh, factual, citeable content with
# zero manual work. Only displays our own data (no third-party redistribution).
# Requires repo secrets: FTP_HOST, FTP_USER, FTP_PASS (already set for deploy).
# -----------------------------------------------------------------------------

name: Build market recap

on:
  schedule:
    - cron: "30 21 * * *"   # daily ~21:30 UTC (after the US session)
  workflow_dispatch: {}

concurrency:
  group: market-recap
  cancel-in-progress: false

jobs:
  recap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download price + history data
        run: |
          mkdir -p data/history
          UA="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124 Safari/537.36"
          get() { curl -fsS -A "$UA" --retry 4 --retry-delay 3 --retry-all-errors -o "$1" "$2"; }
          get data/prices.json "https://preciousmetalscharts.com/prices.json"
          for m in gold silver platinum palladium; do
            get "data/history/$m-1y.json"  "https://preciousmetalscharts.com/history/$m-1y.json"  || true
            sleep 1
            get "data/history/$m-50y.json" "https://preciousmetalscharts.com/history/$m-50y.json" || true
            sleep 1
          done

      - name: Download macro data (FRED, public domain)
        run: |
          mkdir -p data/macro
          # DTWEXBGS = broad USD index, DFII10 = 10y real yield, CPIAUCSL = CPI-U, DGS10 = 10y nominal
          # NASDAQCOM = NASDAQ Composite (since 1971), CBBTCUSD = Coinbase Bitcoin (since ~2014)
          # Download to a .tmp name and only move it into place once it looks like a real
          # CSV (>5 rows). A mid-transfer failure previously left a truncated file in
          # place (curl -o writes directly to the destination); a truncated series makes
          # macroCtx.latest==wkAgo, which silently published "+0.0% this week" with no
          # error. On failure the destination is simply left absent — every generator
          # already null-guards a missing macro CSV.
          for s in DTWEXBGS DFII10 CPIAUCSL DGS10 NASDAQCOM CBBTCUSD; do
            tmp="data/macro/$s.csv.tmp"
            if curl -fsS -o "$tmp" "https://fred.stlouisfed.org/graph/fredgraph.csv?id=$s" && [ "$(wc -l < "$tmp")" -gt 5 ]; then
              mv "$tmp" "data/macro/$s.csv"
            else
              echo "::warning::$s.csv download failed or looked truncated — skipping this series today"
              rm -f "$tmp"
            fi
          done

      - name: Build the recap page
        env:
          DATA_DIR: "./data"
          OUT: "market-recap.html"
          PERIOD: "weekly"
        run: node data-pipeline/node/build-market-recap.mjs

      - name: Build ratio data (stats JSON + downloadable CSV)
        env:
          DATA_DIR: "./data"
        run: node data-pipeline/node/build-ratio-data.mjs

      - name: Build "why is <metal> moving" driver pages
        env:
          DATA_DIR: "./data"
          OUT_DIR: "."
        run: node data-pipeline/node/build-driver-pages.mjs

      - name: Build records & valuation pages (ATH log + inflation-adjusted)
        env:
          DATA_DIR: "./data"
          HIST_FILE: "./public/history/gold.json"
          OUT_DIR: "."
        run: node data-pipeline/node/build-records-pages.mjs

      - name: Build gold vs stocks vs bitcoin comparison page
        env:
          DATA_DIR: "./data"
          HIST_FILE: "./public/history/gold.json"
          OUT_DIR: "."
        run: node data-pipeline/node/build-comparison-page.mjs

      - name: Upload market-recap.html to Vimexx (FTPS)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          curl --fail --show-error --silent \
               --ssl-reqd -k --ftp-pasv --disable-epsv --ftp-create-dirs \
               --connect-timeout 20 --max-time 90 --retry 4 --retry-delay 10 --retry-all-errors \
               -T market-recap.html -u "$FTP_USER:$FTP_PASS" \
               "ftp://$FTP_HOST/public_html/market-recap.html"
          echo "market-recap.html uploaded."
          for f in ratio-stats.json ratio-history.csv; do
            curl --fail --show-error --silent \
                 --ssl-reqd -k --ftp-pasv --disable-epsv --ftp-create-dirs \
                 --connect-timeout 20 --max-time 90 --retry 4 --retry-delay 10 --retry-all-errors \
                 -T "data/$f" -u "$FTP_USER:$FTP_PASS" \
                 "ftp://$FTP_HOST/public_html/$f"
            echo "$f uploaded."
          done
          for m in gold silver platinum palladium; do
            curl --fail --show-error --silent \
                 --ssl-reqd -k --ftp-pasv --disable-epsv --ftp-create-dirs \
                 --connect-timeout 20 --max-time 90 --retry 4 --retry-delay 10 --retry-all-errors \
                 -T "why-is-$m-moving.html" -u "$FTP_USER:$FTP_PASS" \
                 "ftp://$FTP_HOST/public_html/why-is-$m-moving.html"
            echo "why-is-$m-moving.html uploaded."
            curl -s "https://api.indexnow.org/indexnow?url=https://preciousmetalscharts.com/why-is-$m-moving&key=454011a3f4a5e849e205d837cf4d37dc&keyLocation=https://preciousmetalscharts.com/454011a3f4a5e849e205d837cf4d37dc.txt" -o /dev/null || true
          done
          for f in gold-all-time-high.html gold-price-inflation-adjusted.html gold-price-inflation-adjusted.csv; do
            curl --fail --show-error --silent \
                 --ssl-reqd -k --ftp-pasv --disable-epsv --ftp-create-dirs \
                 --connect-timeout 20 --max-time 90 --retry 4 --retry-delay 10 --retry-all-errors \
                 -T "$f" -u "$FTP_USER:$FTP_PASS" \
                 "ftp://$FTP_HOST/public_html/$f"
            echo "$f uploaded."
          done
          for u in gold-all-time-high gold-price-inflation-adjusted; do
            curl -s "https://api.indexnow.org/indexnow?url=https://preciousmetalscharts.com/$u&key=454011a3f4a5e849e205d837cf4d37dc&keyLocation=https://preciousmetalscharts.com/454011a3f4a5e849e205d837cf4d37dc.txt" -o /dev/null || true
          done
          for f in gold-vs-stocks-bitcoin.html gold-vs-stocks-bitcoin.csv; do
            curl --fail --show-error --silent \
                 --ssl-reqd -k --ftp-pasv --disable-epsv --ftp-create-dirs \
                 --connect-timeout 20 --max-time 90 --retry 4 --retry-delay 10 --retry-all-errors \
                 -T "$f" -u "$FTP_USER:$FTP_PASS" \
                 "ftp://$FTP_HOST/public_html/$f"
            echo "$f uploaded."
          done
          curl -s "https://api.indexnow.org/indexnow?url=https://preciousmetalscharts.com/gold-vs-stocks-bitcoin&key=454011a3f4a5e849e205d837cf4d37dc&keyLocation=https://preciousmetalscharts.com/454011a3f4a5e849e205d837cf4d37dc.txt" -o /dev/null || true
          # IndexNow: tell Bing/Yandex the recap just changed
          K=454011a3f4a5e849e205d837cf4d37dc
          curl -s "https://api.indexnow.org/indexnow?url=https://preciousmetalscharts.com/market-recap&key=$K&keyLocation=https://preciousmetalscharts.com/$K.txt" -o /dev/null -w "IndexNow recap → HTTP %{http_code}\n" || true
