# Update price history (daily)
# -----------------------------------------------------------------------------
# Appends the newest daily close(s) to the owned archive (one small API call per
# metal — always within the free 30-day window), regenerates the per-range chart
# files, commits them to the repo, and uploads any changed chart file to Vimexx.
# This is what keeps the archive yours and current without manual work.
# -----------------------------------------------------------------------------

name: Update price history

on:
  schedule:
    - cron: "20 6 * * *"      # daily, 06:20 UTC (after the prior day has settled)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: history
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Append new history
        env:
          METALPRICEAPI_KEY: ${{ secrets.METALPRICEAPI_KEY }}
          OUT_DIR: "./public"
        run: node data-pipeline/node/update-history.mjs

      - name: Commit changes + upload changed chart files to Vimexx (FTPS)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          set -e
          # Which per-range chart files changed this run? (upload only those)
          changed=$(git status --porcelain public/history | awk '{print $2}' | grep -E 'public/history/.*-.*\.json$' || true)

          git config user.name "history-bot"
          git config user.email "bot@users.noreply.github.com"
          git add public/history || true
          git diff --staged --quiet || git commit -m "chore: update price history [skip ci]"
          git push || true

          if [ -z "$changed" ]; then
            echo "No new history today — nothing to upload."; exit 0
          fi
          for f in $changed; do
            fn=$(basename "$f")
            echo "Uploading $fn -> public_html/history/$fn"
            curl --fail --show-error --silent --ssl-reqd -k --ftp-pasv --disable-epsv --ftp-create-dirs \
                 --connect-timeout 20 --max-time 120 --retry 4 --retry-delay 10 --retry-all-errors \
                 -T "$f" -u "$FTP_USER:$FTP_PASS" \
                 "ftp://$FTP_HOST/public_html/history/$fn"
          done
          echo "Daily history sync complete."
