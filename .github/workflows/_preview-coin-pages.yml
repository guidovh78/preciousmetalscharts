# TEMPORARY — generate coin pages against live data and upload as artifacts. Delete after review.
name: _preview-coin-pages
on: { workflow_dispatch: {} }
jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Download data
        run: |
          mkdir -p data
          curl -fsS -A "Mozilla/5.0 (X11; Linux x86_64) Chrome/124" --connect-timeout 20 --max-time 60 --retry 5 --retry-delay 4 --retry-all-errors -o data/prices.json "https://preciousmetalscharts.com/prices.json"
      - name: Generate coin pages
        env: { DATA_DIR: "./data", OUT_DIR: "./out" }
        run: |
          node data-pipeline/node/build-coin-pages.mjs
          echo "=== files ==="; ls -la out/
      - uses: actions/upload-artifact@v4
        with: { name: coin-pages, path: "out/*.html" }
