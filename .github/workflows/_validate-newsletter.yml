# TEMPORARY validation — builds all three newsletter cadences against live data
# and checks each renders with its cadence-specific sections. Delete after use.
name: _validate-newsletter
on: { workflow_dispatch: {} }
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Download data
        run: |
          mkdir -p d/history d/macro
          UA="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/124 Safari/537.36"
          get() { curl -fsS -A "$UA" --retry 4 --retry-delay 3 --retry-all-errors -o "$1" "$2"; }
          get d/prices.json "https://preciousmetalscharts.com/prices.json"
          for m in gold silver platinum palladium; do
            get "d/history/$m-1y.json"  "https://preciousmetalscharts.com/history/$m-1y.json" || true; sleep 1
            get "d/history/$m-50y.json" "https://preciousmetalscharts.com/history/$m-50y.json" || true; sleep 1
          done
          for s in DTWEXBGS DFII10 CPIAUCSL; do curl -fsS -o "d/macro/$s.csv" "https://fred.stlouisfed.org/graph/fredgraph.csv?id=$s" || true; done
      - name: Build all three cadences
        run: |
          set -e
          for P in daily weekly monthly; do
            echo "==================== $P ===================="
            DATA_DIR=./d PERIOD=$P OUT=ed-$P.html node data-pipeline/node/build-newsletter.mjs
            echo "bytes: $(wc -c < ed-$P.html)"
          done
          echo "=== marker checks ==="
          grep -q "Today in metals"       ed-daily.html   && echo "daily: headline OK"
          grep -q "This week in metals"    ed-weekly.html  && echo "weekly: headline OK"
          grep -q "This month in metals"   ed-monthly.html && echo "monthly: headline OK"
          grep -q "Zoom out"               ed-monthly.html && echo "monthly: zoom-out OK"
          grep -q "Macro backdrop"         ed-monthly.html && echo "monthly: macro OK"
          grep -q "percentile"             ed-monthly.html && echo "monthly: ratio percentile OK"
          ! grep -q "Zoom out"             ed-daily.html   && echo "daily: correctly has NO zoom-out"
          ! grep -q "Macro backdrop"       ed-weekly.html  && echo "weekly: correctly has NO macro"
