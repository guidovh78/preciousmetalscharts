name: Upload prices-config (fallback key + web-trigger key)

# One-off helper: writes prices-config.php from GitHub secrets (metalpriceapi
# fallback key + the refresh-prices.php web-trigger key) and FTP-uploads it to
# public_html. Keeps BOTH values out of the repo/git history — refresh-prices.php
# reads them from this file instead of a hardcoded constant.
# Run manually from the Actions tab whenever a key changes.

on:
  workflow_dispatch: {}

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Write + upload prices-config.php from secrets
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          MPA_KEY: ${{ secrets.METALPRICEAPI_KEY }}
          TRIGGER_KEY: ${{ secrets.PRICES_WEB_TRIGGER_KEY }}
        run: |
          set -e
          printf "<?php\nreturn ['metalpriceapi_key' => '%s', 'web_trigger_key' => '%s'];\n" "$MPA_KEY" "$TRIGGER_KEY" > prices-config.php
          curl --fail --show-error --silent \
               --ssl-reqd --ftp-pasv --disable-epsv --ftp-create-dirs \
               --connect-timeout 20 --max-time 120 \
               --retry 4 --retry-delay 10 --retry-all-errors \
               -T prices-config.php -u "$FTP_USER:$FTP_PASS" \
               "ftp://$FTP_HOST/public_html/prices-config.php"
          rm -f prices-config.php
          echo "prices-config.php uploaded to public_html (contents not printed)."
