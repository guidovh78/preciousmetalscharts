name: Upload prices-config (fallback key)

# One-off helper: writes prices-config.php from the METALPRICEAPI_KEY secret and
# FTP-uploads it to public_html, so refresh-prices.php can use metalpriceapi as a
# real second source. The key stays in GitHub secrets — never in the repo or logs.
# Run manually from the Actions tab when the key changes.

on:
  workflow_dispatch: {}

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Write + upload prices-config.php from secret
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          MPA_KEY: ${{ secrets.METALPRICEAPI_KEY }}
        run: |
          set -e
          printf "<?php\nreturn ['metalpriceapi_key' => '%s'];\n" "$MPA_KEY" > prices-config.php
          curl --fail --show-error --silent \
               --ssl-reqd -k --ftp-pasv --disable-epsv --ftp-create-dirs \
               --connect-timeout 20 --max-time 120 \
               --retry 4 --retry-delay 10 --retry-all-errors \
               -T prices-config.php -u "$FTP_USER:$FTP_PASS" \
               "ftp://$FTP_HOST/public_html/prices-config.php"
          rm -f prices-config.php
          echo "prices-config.php uploaded to public_html (contents not printed)."
