# Deploy site to Vimexx
# -----------------------------------------------------------------------------
# Uploads the static site files to Vimexx public_html over FTPS. Runs on every
# push to main that changes one of these files, and can be run manually from the
# Actions tab. Uploads ONLY the listed files (no mirror/delete), so generated
# files on the server (prices.json) and anything else are left untouched.
# -----------------------------------------------------------------------------

name: Deploy site to Vimexx

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "gold-ira.html"
      - "ratio.html"
      - "buy.html"
      - "gold-price.html"
      - "silver-price.html"
      - "platinum-price.html"
      - "palladium-price.html"
      - "premium-calculator.html"
      - "newsletter.html"
      - "newsletter.php"
      - "calculators.html"
      - "dca-calculator.html"
      - "purchasing-power-calculator.html"
      - "ratio-strategy-calculator.html"
      - "methodology.html"
      - "about.html"
      - "disclaimer.html"
      - "affiliate-disclosure.html"
      - "assets/site.css"
      - "assets/site.js"
      - "robots.txt"
      - "llms.txt"
      - "sitemap.xml"
      - ".htaccess"
      - "live/index.html"
      - "live/sw.js"
      - "live/manifest.webmanifest"
      - "live/icon.svg"
      - "live/icon-192.png"
      - "live/icon-512.png"
      - "live/icon-maskable-512.png"
      - "live/apple-touch-icon.png"
      - "live/.htaccess"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-site
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload site files to Vimexx (FTPS)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          set -e
          for f in index.html 404.html gold-ira.html ratio.html buy.html gold-price.html silver-price.html platinum-price.html palladium-price.html premium-calculator.html newsletter.html newsletter.php refresh-prices.php calculators.html dca-calculator.html purchasing-power-calculator.html ratio-strategy-calculator.html methodology.html about.html disclaimer.html affiliate-disclosure.html embed.html widget/index.html widget/ratio.html live/index.html live/sw.js live/manifest.webmanifest live/favicon.ico live/favicon.svg live/icon.svg live/icon-192.png live/icon-512.png live/icon-maskable-512.png live/apple-touch-icon.png live/.htaccess assets/site.css assets/site.js robots.txt llms.txt sitemap.xml sitemap-core.xml app-ad.json 454011a3f4a5e849e205d837cf4d37dc.txt .htaccess; do
            echo "Uploading $f -> public_html/$f"
            curl --fail --show-error --silent \
                 --ssl-reqd -k --ftp-pasv --disable-epsv --ftp-create-dirs \
                 --connect-timeout 20 --max-time 120 \
                 --retry 4 --retry-delay 10 --retry-all-errors \
                 -T "$f" -u "$FTP_USER:$FTP_PASS" \
                 "ftp://$FTP_HOST/public_html/$f"
          done
          for f in assets/fonts/*.woff2; do
            [ -e "$f" ] || continue
            echo "Uploading $f -> public_html/$f"
            curl --fail --show-error --silent \
                 --ssl-reqd -k --ftp-pasv --disable-epsv --ftp-create-dirs \
                 --connect-timeout 20 --max-time 120 \
                 --retry 4 --retry-delay 10 --retry-all-errors \
                 -T "$f" -u "$FTP_USER:$FTP_PASS" \
                 "ftp://$FTP_HOST/public_html/$f"
          done
          echo "All site files uploaded."

      - name: Notify IndexNow (Bing/Yandex — instant indexing)
        run: |
          KEY=454011a3f4a5e849e205d837cf4d37dc
          urls=$(printf '"https://preciousmetalscharts.com%s",' \
            / /gold-price /silver-price /platinum-price /palladium-price /ratio \
            /calculators /dca-calculator /purchasing-power-calculator /ratio-strategy-calculator /premium-calculator \
            /market-recap /coin-prices /gold-price-history /silver-price-history /embed /newsletter \
            /methodology /about /disclaimer /affiliate-disclosure | sed 's/,$//')
          curl -s -X POST "https://api.indexnow.org/indexnow" -H "Content-Type: application/json" \
            -d "{\"host\":\"preciousmetalscharts.com\",\"key\":\"$KEY\",\"keyLocation\":\"https://preciousmetalscharts.com/$KEY.txt\",\"urlList\":[$urls]}" \
            -o /dev/null -w "IndexNow core pages → HTTP %{http_code}\n" || true
