# TEMPORARY — make the live-app phone render's flat background transparent. Delete after use.
name: _make-transparent
on: { workflow_dispatch: {} }
jobs:
  t:
    runs-on: ubuntu-latest
    steps:
      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick
      - name: Make background transparent
        run: |
          curl -fsS -o in.png "https://preciousmetalscharts.com/assets/live_app_mobilephone.png"
          echo "input:"; identify in.png
          bg=$(convert in.png -format '%[pixel:p{2,2}]' info:); echo "corner colour = $bg"
          # Flood-fill transparency from all four corners (connected outer background only),
          # with fuzz to catch anti-aliasing. The phone screen is enclosed by the dark bezel,
          # so its white areas are never touched.
          convert in.png -alpha set -bordercolor "$bg" -border 1 -fuzz 12% \
            -fill none \
            -draw "matte 0,0 floodfill" \
            -draw "matte $(($(identify -format '%w' in.png)-1)),0 floodfill" \
            -draw "matte 0,$(($(identify -format '%h' in.png)-1)) floodfill" \
            -draw "matte $(($(identify -format '%w' in.png)-1)),$(($(identify -format '%h' in.png)-1)) floodfill" \
            -shave 1x1 -trim +repage out.png
          echo "output:"; identify out.png
          echo "mean alpha (1=opaque, <1=has transparency): $(convert out.png -alpha extract -format '%[fx:mean]' info:)"
      - name: Upload transparent copy (new name; original kept as backup)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          curl --fail --show-error --silent --ssl-reqd -k --ftp-pasv --disable-epsv --ftp-create-dirs \
               --connect-timeout 20 --max-time 90 --retry 4 --retry-delay 8 --retry-all-errors \
               -T out.png -u "$FTP_USER:$FTP_PASS" \
               "ftp://$FTP_HOST/public_html/assets/live_app_mobilephone_transparent.png"
          echo "uploaded transparent version."
      - uses: actions/upload-artifact@v4
        with: { name: phone-transparent, path: out.png }
