# TEMPORARY — generate sample year pages against live data and upload as artifacts. Delete after review.
name: _preview-year-pages
on: { workflow_dispatch: {} }
jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Download data
        run: |
          mkdir -p data/history
          UA="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/124 Safari/537.36"
          get() { curl -fsS -A "$UA" --retry 4 --retry-delay 3 --retry-all-errors -o "$1" "$2"; }
          get data/prices.json "https://preciousmetalscharts.com/prices.json"
          for m in gold silver; do
            for tf in 50y 20y 10y 5y 1y; do get "data/history/$m-$tf.json" "https://preciousmetalscharts.com/history/$m-$tf.json" || true; sleep 1; done
          done
      - name: Generate sample pages
        env:
          DATA_DIR: "./data"
          OUT_DIR: "./out"
          METALS: "gold,silver"
          YEARS: "2008,2011,2024,2025"
        run: |
          node data-pipeline/node/build-year-pages.mjs
          echo "=== files ==="; ls -la out/
      - uses: actions/upload-artifact@v4
        with:
          name: year-pages
          path: out/*.html
