# Refresh metal prices
# -----------------------------------------------------------------------------
# Runs on a schedule, rebuilds public/prices.json with multi-source failover,
# commits the snapshot back to the repo (so day-change + stale fallback have
# state between runs), and uploads prices.json to Vimexx over FTPS so the live
# site can serve /prices.json. Visitors read that static file — never a provider.
# -----------------------------------------------------------------------------

name: Refresh metal prices

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 min (GitHub may delay a few min — fine for a price cache)
  workflow_dispatch: {}       # allows a manual run from the Actions tab

permissions:
  contents: write

concurrency:
  group: refresh-prices
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch prices and build snapshot
        env:
          # gold-api.com (primary) is keyless — needs nothing here.
          METALPRICEAPI_KEY: ${{ secrets.METALPRICEAPI_KEY }}
          CROSS_CHECK: "false"
          OUT_DIR: "./public"
        run: node data-pipeline/node/refresh-prices.mjs

      # Save state to the repo FIRST so a flaky FTP upload never loses data.
      - name: Commit snapshot state back to repo
        run: |
          git config user.name "prices-bot"
          git config user.email "bot@users.noreply.github.com"
          git add public/prices.json public/baseline.json || true
          git diff --staged --quiet || git commit -m "chore: refresh prices [skip ci]"
          git push || true

      - name: Upload prices.json to Vimexx (FTPS)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          # --ssl-reqd keeps the transfer ENCRYPTED (FTPS). -k accepts Vimexx's
          # self-signed FTPS cert. --ftp-pasv forces passive mode. Retries ride
          # out transient firewall/network hiccups; each attempt is a fresh
          # connection so a temporary block can clear between tries.
          echo "Uploading public/prices.json to $FTP_HOST ..."
          curl --fail --show-error --silent \
               --ssl-reqd -k --ftp-pasv --disable-epsv \
               --connect-timeout 20 --max-time 90 \
               --retry 4 --retry-delay 10 --retry-all-errors \
               -T public/prices.json \
               -u "$FTP_USER:$FTP_PASS" \
               "ftp://$FTP_HOST/prices.json"
          echo "Upload OK."
