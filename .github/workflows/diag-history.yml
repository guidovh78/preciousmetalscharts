# DIAG: probe free deep-history sources from a GitHub runner (clean internet).
# Temporary, manual-only. Reports which source returns usable daily CSV + depth.
name: DIAG history sources

on:
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe sources
        run: |
          probe () { # $1 = label, $2 = url
            echo "================= $1 ================="
            d=$(curl -s --max-time 40 -A "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/124 Safari/537.36" "$2")
            echo "first line: $(printf '%s' "$d" | head -1 | cut -c1-70)"
            echo "data rows : $(printf '%s' "$d" | grep -cE '^[0-9]{4}-[0-9]{2}-[0-9]{2}')"
            echo "range     : $(printf '%s' "$d" | grep -E '^[0-9]{4}-' | head -1 | cut -d, -f1) .. $(printf '%s' "$d" | grep -E '^[0-9]{4}-' | tail -1 | cut -d, -f1)"
          }
          probe "Stooq gold xauusd"      "https://stooq.com/q/d/l/?s=xauusd&i=d"
          probe "Stooq silver xagusd"    "https://stooq.com/q/d/l/?s=xagusd&i=d"
          probe "Stooq platinum xptusd"  "https://stooq.com/q/d/l/?s=xptusd&i=d"
          probe "Stooq palladium xpdusd" "https://stooq.com/q/d/l/?s=xpdusd&i=d"
          probe "FRED gold AM (LBMA)"    "https://fred.stlouisfed.org/graph/fredgraph.csv?id=GOLDAMGBD228NLBM"
          probe "FRED gold PM (LBMA)"    "https://fred.stlouisfed.org/graph/fredgraph.csv?id=GOLDPMGBD228NLBM"
          echo "done."
