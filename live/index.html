<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Live Metal Prices — Gold, Silver, Platinum, Palladium | preciousmetalscharts</title>
<meta name="description" content="Live spot prices for gold, silver, platinum and palladium — ~10 minutes delayed, auto-refreshing. A fast, glanceable price page from preciousmetalscharts.">
<meta name="robots" content="index, follow, max-image-preview:large">
<link rel="canonical" href="https://live.preciousmetalscharts.com/">
<meta name="theme-color" content="#0D0E11">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Metals Live">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/icon.svg">
<meta property="og:type" content="website"><meta property="og:title" content="Live Metal Prices"><meta property="og:description" content="Live gold, silver, platinum and palladium spot prices — ~10 min delayed, auto-refreshing."><meta property="og:url" content="https://live.preciousmetalscharts.com/">
<style>
  :root{--bg:#F4F4F1;--surface:#FFFFFF;--surface-2:#FAFAF8;--ink:#17191E;--muted:#6B7177;--faint:#9AA0A6;--line:#E5E6E2;--line-strong:#D6D7D2;--accent:#9A7322;--accent-soft:#F0E6CF;--up:#1A7F5A;--down:#C2453A;--gold:#C19A2E;--silver:#8C9298;--platinum:#9FB1BB;--palladium:#B8997A;--radius:14px;--radius-sm:10px;--mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  html[data-theme="dark"]{--bg:#0D0E11;--surface:#16181D;--surface-2:#1B1E24;--ink:#ECEDEA;--muted:#8A9099;--faint:#5E646C;--line:#24272E;--line-strong:#2E323A;--accent:#D4A24E;--accent-soft:#2A2316;--up:#46B488;--down:#E0685C;--gold:#D4A93C;--silver:#A6ADB4;--platinum:#AFC3CE;--palladium:#CDAE8E;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);}
  .wrap{max-width:760px;margin:0 auto;padding:16px 16px 28px;}
  header{display:flex;align-items:center;gap:9px;margin-bottom:14px;}
  .mark{width:26px;height:26px;flex:none;}
  .wm{font-size:15px;font-weight:600;letter-spacing:-.01em;}
  .wm .b{color:var(--accent);}
  .live-tag{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);border:1px solid var(--accent);border-radius:5px;padding:1px 6px;}
  .ctrl{margin-left:auto;display:flex;align-items:center;gap:8px;}
  .seg{display:inline-flex;background:var(--surface-2);border:1px solid var(--line);border-radius:8px;padding:2px;font-family:var(--mono);font-size:12px;}
  .seg button{border:0;background:transparent;color:var(--muted);font-weight:600;padding:4px 9px;border-radius:6px;cursor:pointer;}
  .seg button[aria-pressed="true"]{background:var(--surface);color:var(--ink);}
  .iconbtn{width:32px;height:32px;border:1px solid var(--line);background:var(--surface);border-radius:9px;color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  @media(max-width:620px){.grid{grid-template-columns:repeat(2,1fr);}}
  .tile{text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px;cursor:pointer;font:inherit;color:inherit;width:100%;}
  .tile:hover{border-color:var(--line-strong);}
  .tile.open{border-color:var(--accent);}
  .th{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px;vertical-align:0;}
  .sym{font-family:var(--mono);color:var(--faint);font-size:11px;}
  .price{font-family:var(--mono);font-size:21px;font-weight:600;letter-spacing:-.02em;margin:7px 0 2px;}
  .chg{font-family:var(--mono);font-size:11.5px;font-weight:600;}
  .chg.up{color:var(--up);}.chg.down{color:var(--down);}
  .spark{display:block;width:100%;height:22px;margin-top:6px;}
  .detail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--line);}
  .tile.open .detail{display:block;}
  .drow{display:flex;justify-content:space-between;font-family:var(--mono);font-size:12px;margin:4px 0;color:var(--muted);}
  .drow b{color:var(--ink);font-weight:600;}
  .dlink{display:inline-block;margin-top:8px;font-size:12px;color:var(--accent);text-decoration:none;font-family:var(--sans);}
  .fresh{font-family:var(--mono);font-size:11px;color:var(--muted);margin:11px 2px 0;display:flex;align-items:center;gap:6px;}
  .livedot{width:7px;height:7px;border-radius:50%;background:var(--up);display:inline-block;}
  .ad{border:1px dashed var(--line-strong);border-radius:var(--radius-sm);padding:16px;margin-top:16px;text-align:center;min-height:108px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;}
  .ad .lbl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);}
  .ad .ph{font-size:12.5px;color:var(--muted);}
  footer{margin-top:18px;text-align:center;font-size:12.5px;color:var(--muted);}
  footer a{color:var(--accent);text-decoration:none;margin:0 7px;}
  .disclaim{font-size:11px;color:var(--faint);text-align:center;margin-top:10px;line-height:1.5;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <svg class="mark" viewBox="0 0 34 34" fill="none" aria-hidden="true"><rect x="1" y="1" width="32" height="32" rx="9" fill="none" stroke="var(--line-strong)"/><path d="M8 22.5 L14 16 L18.5 19.5 L26 10" fill="none" stroke="var(--accent)" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"/><rect x="23.4" y="7.4" width="5.2" height="5.2" rx="1.3" fill="var(--accent)"/></svg>
    <span class="wm"><span>preciousmetals</span><span class="b">charts</span></span>
    <span class="live-tag">live</span>
    <div class="ctrl">
      <span class="seg" id="curSeg" role="group" aria-label="Currency"><button type="button" data-cur="usd" aria-pressed="true">USD</button><button type="button" data-cur="eur" aria-pressed="false">EUR</button></span>
      <button class="iconbtn" id="themeBtn" aria-label="Toggle dark mode"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="themeIcon"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></button>
    </div>
  </header>

  <div class="grid" id="grid"></div>

  <div class="fresh"><span class="livedot"></span><span id="fresh">loading live prices…</span></div>

  <aside class="ad" aria-label="Advertisement">
    <span class="lbl">Advertisement</span>
    <span class="ph">Reserved space — your ad or sponsor goes here</span>
  </aside>

  <footer>
    <a href="https://preciousmetalscharts.com/">Charts</a><a href="https://preciousmetalscharts.com/ratio">Ratio</a><a href="https://preciousmetalscharts.com/calculators">Calculators</a><a href="https://preciousmetalscharts.com/premium-calculator">Premium</a>
    <div class="disclaim">Independent — not a dealer. Spot prices ~10 minutes delayed; verify before transacting. Educational information only, not investment advice.</div>
  </footer>
</div>

<script>
(function(){
  var API=(location.hostname==='localhost'||location.hostname==='127.0.0.1'||location.port==='4321')?'':'https://preciousmetalscharts.com';
  var OZT=31.1034768;
  var METALS=[{k:'gold',n:'Gold',s:'XAU'},{k:'silver',n:'Silver',s:'XAG'},{k:'platinum',n:'Platinum',s:'XPT'},{k:'palladium',n:'Palladium',s:'XPD'}];
  var cur='usd', fx=1, snap=null, hist={}, open={};
  try{ cur=localStorage.getItem('pmc_live_cur')||'usd'; }catch(e){}
  try{ var t=localStorage.getItem('pmc_live_theme'); if(t)document.documentElement.setAttribute('data-theme',t); }catch(e){}
  function id(x){return document.getElementById(x);}
  function sym(){return cur==='eur'?'€':'$';}
  function rate(){return cur==='eur'?fx:1;}
  function money(n,dp){if(n==null||isNaN(n))return '—';var v=n*rate();return sym()+v.toLocaleString('en-US',{minimumFractionDigits:dp,maximumFractionDigits:dp});}
  function sparkPath(pts){if(!pts||pts.length<2)return '';var v=pts.map(function(p){return p[1];}),mn=Math.min.apply(null,v),mx=Math.max.apply(null,v),rg=(mx-mn)||1,n=v.length,d='';for(var i=0;i<n;i++){var x=(i/(n-1)*100).toFixed(1),y=(20-(v[i]-mn)/rg*18-1).toFixed(1);d+=(i?' L':'M')+x+' '+y;}return d;}
  function buildTiles(){
    var html='';
    METALS.forEach(function(m){
      html+='<button class="tile" data-k="'+m.k+'" aria-expanded="false">'
        +'<div class="th"><span><span class="dot" style="background:var(--'+m.k+')"></span>'+m.n+'</span><span class="sym">'+m.s+'</span></div>'
        +'<div class="price" data-f="price">—</div><div class="chg" data-f="chg">—</div>'
        +'<svg class="spark" viewBox="0 0 100 22" preserveAspectRatio="none" aria-hidden="true"><path data-f="spark" fill="none" stroke="var(--'+m.k+')" stroke-width="1.6"/></svg>'
        +'<div class="detail">'
        +'<div class="drow"><span>Per gram</span><b data-f="g">—</b></div>'
        +'<div class="drow"><span>Per kilo</span><b data-f="kg">—</b></div>'
        +'<div class="drow"><span>1 week</span><b data-f="w1">—</b></div>'
        +'<div class="drow"><span>1 month</span><b data-f="m1">—</b></div>'
        +'<a class="dlink" href="'+(API||'https://preciousmetalscharts.com')+'/'+m.k+'-price">Open full chart &amp; 50-year history →</a>'
        +'</div></button>';
    });
    id('grid').innerHTML=html;
    id('grid').addEventListener('click',function(e){var t=e.target.closest('.tile');if(!t||e.target.closest('a'))return;var k=t.getAttribute('data-k');open[k]=!open[k];t.classList.toggle('open',open[k]);t.setAttribute('aria-expanded',open[k]?'true':'false');});
  }
  function pctTxt(n){return (n>=0?'▲ +':'▼ ')+Math.abs(n).toFixed(2)+'%';}
  function paint(){
    if(!snap||!snap.metals)return;
    METALS.forEach(function(m){
      var tile=document.querySelector('.tile[data-k="'+m.k+'"]'); if(!tile)return;
      var d=snap.metals[m.k]; if(!d||d.price==null)return;
      var p=d.price, chg=d.changePct==null?0:d.changePct;
      tile.querySelector('[data-f="price"]').textContent=money(p,2);
      var c=tile.querySelector('[data-f="chg"]'); c.textContent=pctTxt(chg); c.className='chg '+(chg>=0?'up':'down');
      tile.querySelector('[data-f="g"]').textContent=money(p/OZT,2);
      tile.querySelector('[data-f="kg"]').textContent=money(p/OZT*1000,0);
      var h=hist[m.k];
      if(h&&h.length>1){
        tile.querySelector('[data-f="spark"]').setAttribute('d',sparkPath(h));
        var last=h[h.length-1][1], mFirst=h[0][1], wIdx=Math.max(0,h.length-6), wFirst=h[wIdx][1];
        var w1=(last-wFirst)/wFirst*100, m1=(last-mFirst)/mFirst*100;
        tile.querySelector('[data-f="w1"]').textContent=(w1>=0?'+':'')+w1.toFixed(1)+'%';
        tile.querySelector('[data-f="m1"]').textContent=(m1>=0?'+':'')+m1.toFixed(1)+'%';
      }
    });
    var gold=snap.metals.gold;
    if(gold&&gold.price!=null){var gv=Math.round(gold.price*rate());document.title='Au '+sym()+gv.toLocaleString('en-US')+' '+((gold.changePct||0)>=0?'▲':'▼')+' · metals live';}
    var when=new Date(snap.updatedAt), hhmm=isNaN(when.getTime())?'':when.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    id('fresh').textContent=(hhmm?('updated '+hhmm+' · '):'')+'~'+(snap.delayedMinutes||10)+' min delayed · auto-refresh 60s'+(snap.stale?' · last refresh failed':'');
  }
  function loadPrices(){fetch(API+'/prices.json',{cache:'no-store'}).then(function(r){return r.ok?r.json():null;}).then(function(s){if(s){snap=s;if(s.fx&&s.fx.eur>0)fx=s.fx.eur;paint();}}).catch(function(){});}
  function loadHist(){METALS.forEach(function(m){fetch(API+'/history/'+m.k+'-1m.json').then(function(r){return r.ok?r.json():null;}).then(function(f){if(f&&f.points){hist[m.k]=f.points;paint();}}).catch(function(){});});}
  id('curSeg').addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;cur=b.getAttribute('data-cur');try{localStorage.setItem('pmc_live_cur',cur);}catch(x){}Array.prototype.forEach.call(this.querySelectorAll('button'),function(z){z.setAttribute('aria-pressed',z.getAttribute('data-cur')===cur?'true':'false');});paint();});
  (function(){var b=document.querySelector('#curSeg [data-cur="'+cur+'"]');if(b){Array.prototype.forEach.call(document.querySelectorAll('#curSeg button'),function(z){z.setAttribute('aria-pressed','false');});b.setAttribute('aria-pressed','true');}})();
  var sun='<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>',moon='<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>';
  function setIcon(){id('themeIcon').innerHTML=document.documentElement.getAttribute('data-theme')==='dark'?moon:sun;}
  id('themeBtn').addEventListener('click',function(){var n=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',n);try{localStorage.setItem('pmc_live_theme',n);}catch(x){}setIcon();});
  setIcon();
  buildTiles(); loadPrices(); loadHist(); setInterval(loadPrices,60000);
  if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('/sw.js').catch(function(){});});}
})();
</script>
</body>
</html>
