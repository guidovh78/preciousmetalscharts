<style>
  @font-face{font-family:'IBM Plex Mono';font-style:normal;font-weight:400;font-display:swap;src:url('https://preciousmetalscharts.com/assets/fonts/ibm-plex-mono-400.woff2') format('woff2');}
  @font-face{font-family:'IBM Plex Mono';font-style:normal;font-weight:500;font-display:swap;src:url('https://preciousmetalscharts.com/assets/fonts/ibm-plex-mono-500.woff2') format('woff2');}
  @font-face{font-family:'IBM Plex Mono';font-style:normal;font-weight:600;font-display:swap;src:url('https://preciousmetalscharts.com/assets/fonts/ibm-plex-mono-600.woff2') format('woff2');}
  :root{--bg:#F4F4F1;--surface:#FFFFFF;--surface-2:#FAFAF8;--ink:#17191E;--muted:#6B7177;--faint:#9AA0A6;--line:#E5E6E2;--line-strong:#D6D7D2;--accent:#9A7322;--accent-soft:#F0E6CF;--up:#1A7F5A;--down:#C2453A;--gold:#C19A2E;--silver:#8C9298;--platinum:#9FB1BB;--palladium:#B8997A;--radius:14px;--radius-sm:10px;--mono:'IBM Plex Mono',ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  html[data-theme="dark"]{--bg:#0D0E11;--surface:#16181D;--surface-2:#1B1E24;--ink:#ECEDEA;--muted:#8A9099;--faint:#5E646C;--line:#24272E;--line-strong:#2E323A;--accent:#D4A24E;--accent-soft:#2A2316;--up:#46B488;--down:#E0685C;--gold:#D4A93C;--silver:#A6ADB4;--platinum:#AFC3CE;--palladium:#CDAE8E;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);}
  .wrap{max-width:600px;margin:0 auto;padding:16px 16px 28px;}
  header{display:flex;align-items:center;gap:9px;margin-bottom:14px;}
  .mark{width:26px;height:26px;flex:none;}
  .wm{font-size:15px;font-weight:600;letter-spacing:-.01em;}
  .wm .b{color:var(--accent);}
  .live-tag{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);border:1px solid var(--accent);border-radius:6px;padding:3px 8px;}
  .live-tag .livedot{background:var(--accent);}
  .iconbtn{margin-left:auto;width:34px;height:34px;border:1px solid var(--line);background:var(--surface);border-radius:9px;color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;}
  /* nav icons */
  nav.appnav{display:grid;grid-template-columns:repeat(4,1fr);background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;}
  nav.appnav a{display:flex;flex-direction:column;align-items:center;gap:7px;padding:13px 4px;color:var(--ink);text-decoration:none;font-size:12.5px;border-right:1px solid var(--line);}
  nav.appnav a:last-child{border-right:0;}
  nav.appnav a:hover,nav.appnav a:active{background:var(--surface-2);color:var(--accent);}
  nav.appnav a svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
  /* controls card */
  .controls{display:grid;grid-template-columns:1.15fr 1fr;gap:14px;align-items:end;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;}
  .ctl{display:flex;flex-direction:column;gap:6px;min-width:0;}
  .ctl > span{font-size:12px;color:var(--muted);}
  select.cur{appearance:none;-webkit-appearance:none;background:var(--surface) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' fill='none' stroke='%236B7177' stroke-width='1.5'/></svg>") no-repeat right 11px center;border:1px solid var(--line-strong);color:var(--ink);border-radius:10px;padding:10px 28px 10px 12px;font-size:14px;font-family:var(--sans);width:100%;min-width:0;cursor:pointer;text-overflow:ellipsis;}
  .seg{display:flex;width:100%;background:var(--surface-2);border:1px solid var(--line-strong);border-radius:10px;padding:3px;}
  .seg button{flex:1;border:0;background:transparent;color:var(--muted);font-size:13px;font-weight:600;padding:8px 4px;border-radius:7px;line-height:1;cursor:pointer;font-family:var(--sans);white-space:nowrap;}
  .seg button[aria-pressed="true"]{background:var(--accent);color:#fff;}
  html[data-theme="dark"] .seg button[aria-pressed="true"]{color:#1a1406;}
  /* status line */
  .status{display:flex;align-items:center;gap:9px;flex-wrap:wrap;font-size:12.5px;color:var(--muted);margin:2px 2px 11px;}
  .status .lp{color:var(--accent);font-weight:600;display:inline-flex;align-items:center;gap:6px;}
  .status .livedot{width:7px;height:7px;border-radius:50%;background:var(--accent);display:inline-block;}
  .status .ar{margin-left:auto;white-space:nowrap;}
  .status .ar b{color:var(--up);font-weight:600;}
  .status #fresh.stale{color:var(--down);font-weight:600;}
  .status .redot{background:var(--up);animation:pulse 2.4s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(26,127,90,.45);}70%{box-shadow:0 0 0 5px rgba(26,127,90,0);}100%{box-shadow:0 0 0 0 rgba(26,127,90,0);}}
  /* rows */
  .rows{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
  .row-wrap{border-bottom:1px solid var(--line);}
  .row-wrap:last-child{border-bottom:0;}
  .row{display:grid;grid-template-columns:auto minmax(0,1fr) auto;align-items:center;gap:13px;width:100%;text-align:left;background:transparent;border:0;padding:14px 15px;cursor:pointer;font:inherit;color:inherit;}
  .row:hover,.row.open{background:var(--surface-2);}
  .chip{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#fff;flex:none;letter-spacing:.01em;}
  .rname{display:flex;flex-direction:column;line-height:1.2;min-width:0;}
  .rname .nm{font-size:14.5px;font-weight:700;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .rname .pur{font-size:11.5px;color:var(--faint);font-family:var(--mono);}
  .rright{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex:none;}
  .rprice{line-height:1.1;white-space:nowrap;}
  .rprice .v{font-family:var(--mono);font-size:18px;font-weight:600;letter-spacing:-.01em;}
  .rprice .u{font-size:11px;color:var(--faint);margin-left:2px;}
  .rsub{display:flex;align-items:center;gap:11px;}
  .rchg{font-family:var(--mono);font-size:12px;font-weight:600;line-height:1.22;text-align:right;white-space:nowrap;display:flex;flex-direction:column;}
  .rchg.up{color:var(--up);} .rchg.down{color:var(--down);} .rchg.flat{color:var(--muted);}
  .rspark{width:72px;height:38px;flex:none;}
  .rspark svg{display:block;}
  .panel{display:none;padding:4px 15px 18px;background:var(--surface-2);}
  .panel.show{display:block;}
  .pmeta{display:flex;flex-wrap:wrap;gap:6px 18px;font-family:var(--mono);font-size:12px;color:var(--muted);margin:6px 0 10px;}
  .pmeta b{color:var(--ink);font-weight:600;}
  .ranges{display:inline-flex;gap:2px;background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:2px;margin-bottom:8px;}
  .ranges button{border:0;background:transparent;color:var(--muted);font-size:11.5px;font-weight:600;padding:5px 10px;border-radius:6px;cursor:pointer;font-family:var(--mono);}
  .ranges button[aria-pressed="true"]{background:var(--accent-soft);color:var(--accent);}
  .chart{position:relative;aspect-ratio:760/300;}
  .chart svg{width:100%;height:auto;display:block;}
  .chlabel{position:absolute;pointer-events:none;transform:translate(-50%,-130%);background:var(--ink);color:var(--bg);font-family:var(--mono);font-size:11px;padding:3px 7px;border-radius:6px;white-space:nowrap;opacity:0;transition:opacity .1s;}
  .deeper{display:inline-block;margin-top:8px;font-size:13px;color:var(--accent);text-decoration:none;font-weight:500;}
  .pnote{font-size:11px;color:var(--faint);margin:8px 0 0;line-height:1.5;}
  /* view all */
  .viewall{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-top:12px;color:var(--accent);font-weight:600;font-size:14.5px;text-decoration:none;}
  .viewall:hover{background:var(--surface-2);}
  .ad{border:1px dashed var(--line-strong);border-radius:var(--radius-sm);padding:14px;margin-top:14px;text-align:center;min-height:96px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;}
  .ad .lbl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);}
  .ad .ph{font-size:12.5px;color:var(--muted);}
  footer{margin-top:18px;padding-top:14px;border-top:1px solid var(--line);display:flex;align-items:baseline;justify-content:space-between;gap:12px;}
  footer .disc{font-size:12px;color:var(--muted);line-height:1.5;}
  footer a{color:var(--accent);text-decoration:none;font-size:12.5px;font-weight:500;white-space:nowrap;}
  @media(max-width:430px){.row{gap:11px;}.rspark{width:60px;height:34px;}.rprice .v{font-size:17px;}}
  @media(max-width:340px){.rspark{display:none;}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <a href="https://preciousmetalscharts.com/" aria-label="preciousmetalscharts home" style="display:flex;align-items:center;gap:9px;text-decoration:none;color:inherit;">
      <svg class="mark" viewBox="0 0 34 34" fill="none" aria-hidden="true"><rect x="1" y="1" width="32" height="32" rx="9" fill="none" stroke="var(--line-strong)"/><path d="M8 22.5 L14 16 L18.5 19.5 L26 10" fill="none" stroke="var(--accent)" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"/><rect x="23.4" y="7.4" width="5.2" height="5.2" rx="1.3" fill="var(--accent)"/></svg>
      <span class="wm"><span>preciousmetals</span><span class="b">charts</span></span>
    </a>
    <span class="live-tag"><span class="livedot"></span>Live</span>
    <button class="iconbtn" id="themeBtn" aria-label="Toggle dark mode"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="themeIcon"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></button>
  </header>

  <nav class="appnav" aria-label="Site">
    <a href="https://preciousmetalscharts.com/"><svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 14l3-4 3 3 4-6"/></svg><span>Charts</span></a>
    <a href="https://preciousmetalscharts.com/ratio"><svg viewBox="0 0 24 24"><path d="M12 3v18M5 7h14M7 7l-3 6a3 3 0 0 0 6 0L7 7zM17 7l-3 6a3 3 0 0 0 6 0l-3-6zM8 21h8"/></svg><span>Ratio</span></a>
    <a href="https://preciousmetalscharts.com/calculators"><svg viewBox="0 0 24 24"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M8 7h8M8 11h0M12 11h0M16 11h0M8 15h0M12 15h0M16 15h4"/></svg><span>Calculators</span></a>
    <a href="https://preciousmetalscharts.com/newsletter"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg><span>Newsletter</span></a>
  </nav>

  <div class="controls">
    <label class="ctl"><span>Currency</span>
      <select class="cur" id="curSel" aria-label="Currency"></select></label>
    <label class="ctl"><span>Unit</span>
      <span class="seg" id="unitSeg" role="group" aria-label="Unit"><button type="button" data-u="g">Gram</button><button type="button" data-u="oz" aria-pressed="true">Ounce</button><button type="button" data-u="kg">Kilo</button></span></label>
  </div>

  <div class="status">
    <span class="lp"><span class="livedot redot"></span>Live prices</span>
    <span id="fresh">loading…</span>
    <span class="ar">Auto-refresh <b>On</b></span>
  </div>

  <div class="rows" id="rows"></div>

  <a class="viewall" href="https://preciousmetalscharts.com/">View all metals <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></a>

  <aside class="ad" aria-label="Advertisement">
    <span class="lbl">Advertisement</span>
    <span class="ph">Reserved space — your ad or sponsor goes here</span>
  </aside>

  <footer>
    <div class="disc">Independent, not a dealer. Spot prices ~10 minutes delayed. For educational information only.</div>
    <a href="https://preciousmetalscharts.com/methodology">Learn more</a>
  </footer>
</div>

<script>
(function(){
  var API=(location.hostname==='localhost'||location.hostname==='127.0.0.1'||location.port==='4321')?'':'https://preciousmetalscharts.com';
  var OZT=31.1034768;
  var METALS=[{k:'gold',n:'Gold',s:'XAU',sym:'Au',pur:'24K'},{k:'silver',n:'Silver',s:'XAG',sym:'Ag',pur:'.999'},{k:'platinum',n:'Platinum',s:'XPT',sym:'Pt',pur:'.9995'},{k:'palladium',n:'Palladium',s:'XPD',sym:'Pd',pur:'.9995'}];
  var CHIP={gold:'#C19A2E',silver:'#8C9298',platinum:'#4F555E',palladium:'#8A6A4A'};
  var CURR=[['USD','US Dollar'],['EUR','Euro'],['GBP','British Pound'],['JPY','Japanese Yen'],['CNY','Chinese Yuan'],['AUD','Australian Dollar'],['CAD','Canadian Dollar'],['CHF','Swiss Franc'],['HKD','Hong Kong Dollar'],['SGD','Singapore Dollar']];
  var HR={'1m':'1m','1y':'1y','5y':'5y','max':'50y'};
  var cur='USD', unit='oz', rates={USD:1}, snap=null, open=null, range='1y', fmtCache={};
  try{cur=localStorage.getItem('pmc_live_cur')||'USD';}catch(e){}
  try{unit=localStorage.getItem('pmc_live_unit')||'oz';}catch(e){}
  try{var t=localStorage.getItem('pmc_live_theme');if(t)document.documentElement.setAttribute('data-theme',t);}catch(e){}
  function id(x){return document.getElementById(x);}
  function rate(){return rates[cur]||1;}
  function unitF(){return unit==='oz'?1:unit==='g'?1/OZT:1000/OZT;}
  function unitLabel(){return unit==='oz'?'oz':unit==='g'?'g':'kg';}
  function fmt(v){if(v==null||isNaN(v))return '—';var f=fmtCache[cur];if(!f){try{f=new Intl.NumberFormat('en-US',{style:'currency',currency:cur});}catch(e){f=new Intl.NumberFormat('en-US',{maximumFractionDigits:2});}fmtCache[cur]=f;}return f.format(v);}
  function num(v){return Math.abs(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
  function conv(perOzUSD){return perOzUSD*unitF()*rate();}

  (function(){var sel=id('curSel');sel.innerHTML=CURR.map(function(c){return '<option value="'+c[0]+'">'+c[0]+' — '+c[1]+'</option>';}).join('');sel.value=cur;})();
  id('rows').innerHTML=METALS.map(function(m){
    return '<div class="row-wrap" data-k="'+m.k+'">'
      +'<button class="row" data-k="'+m.k+'" aria-expanded="false">'
      +'<span class="chip" style="background:'+CHIP[m.k]+'">'+m.sym+'</span>'
      +'<span class="rname"><span class="nm">'+m.n.toUpperCase()+'</span><span class="pur">'+m.pur+'</span></span>'
      +'<span class="rright"><span class="rprice"><span class="v" data-f="price">—</span><span class="u">/'+unitLabel()+'</span></span>'
      +'<span class="rsub"><span class="rchg" data-f="chg">—</span><span class="rspark" data-spark="'+m.k+'"></span></span></span>'
      +'</button>'
      +'<div class="panel" data-panel="'+m.k+'"></div>'
      +'</div>';
  }).join('');

  function pctTxt(n){return (n>=0?'+':'−')+Math.abs(n).toFixed(2)+'%';}
  function renderRow(m){
    var wrap=document.querySelector('.row-wrap[data-k="'+m.k+'"]'); if(!wrap)return;
    var d=snap&&snap.metals&&snap.metals[m.k]; if(!d||d.price==null)return;
    var chg=d.changePct==null?0:d.changePct, flat=Math.abs(chg)<0.005;
    var prevOz=d.price/(1+chg/100), absDisp=(d.price-prevOz)*unitF()*rate();
    wrap.querySelector('[data-f="price"]').textContent=fmt(conv(d.price));
    wrap.querySelector('.rprice .u').textContent='/'+unitLabel();
    var c=wrap.querySelector('[data-f="chg"]');
    if(flat){c.innerHTML='<span>0.00</span><span>0.00%</span>';c.className='rchg flat';}
    else{c.innerHTML='<span>'+(chg>=0?'+':'−')+num(absDisp)+'</span><span>'+pctTxt(chg)+'</span>';c.className='rchg '+(chg>=0?'up':'down');}
  }
  function renderAll(){METALS.forEach(renderRow);
    var g=snap&&snap.metals&&snap.metals.gold;
    if(g&&g.price!=null){document.title=fmt(conv(g.price))+' '+((g.changePct||0)>=0?'▲':'▼')+' gold · metals live';}
    if(open)renderPanelMeta(open);
  }
  function renderPanelMeta(k){
    var d=snap&&snap.metals&&snap.metals[k];var p=document.querySelector('[data-panel="'+k+'"]');if(!d||!p)return;
    var chg=d.changePct==null?0:d.changePct, openPerOz=d.price/(1+chg/100), absUSD=(d.price-openPerOz);
    var meta=p.querySelector('.pmeta'); if(meta){
      meta.innerHTML='<span>Per oz <b>'+fmt(d.price*1*rate())+'</b></span><span>Per gram <b>'+fmt(d.price/OZT*rate())+'</b></span><span>Per kilo <b>'+fmt(d.price/OZT*1000*rate())+'</b></span><span>Day change <b>'+(chg>=0?'+':'−')+fmt(Math.abs(absUSD)*unitF()*rate())+' ('+pctTxt(chg)+')</b></span>';
    }
  }

  // ---- per-row intraday mini chart (from /intraday.json; daily history as fallback) ----
  function drawSpark(metalK,vals){
    var host=document.querySelector('[data-spark="'+metalK+'"]');if(!host||!vals||vals.length<2)return;
    var w=80,h=40,pad=3,mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals),rg=(mx-mn)||1,n=vals.length;
    var X=function(i){return pad+i/(n-1)*(w-2*pad);},Y=function(v){return h-pad-(v-mn)/rg*(h-2*pad);};
    var d='M'+X(0).toFixed(1)+' '+Y(vals[0]).toFixed(1);
    for(var i=1;i<n;i++){d+=' L'+X(i).toFixed(1)+' '+Y(vals[i]).toFixed(1);}
    var col='var(--'+metalK+')',area=d+' L'+(w-pad)+' '+(h-pad)+' L'+pad+' '+(h-pad)+' Z',gid='sp_'+metalK;
    host.innerHTML='<svg viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none" width="100%" height="'+h+'" aria-hidden="true"><defs><linearGradient id="'+gid+'" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="'+col+'" stop-opacity=".16"/><stop offset="1" stop-color="'+col+'" stop-opacity="0"/></linearGradient></defs><path d="'+area+'" fill="url(#'+gid+')"/><path d="'+d+'" fill="none" stroke="'+col+'" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round"/></svg>';
  }
  function fallbackSpark(m){fetch(API+'/history/'+m.k+'-1m.json',{cache:'force-cache'}).then(function(r){return r.ok?r.json():null;}).then(function(f){if(f&&f.points)drawSpark(m.k,f.points.slice(-14).map(function(p){return p[1];}));}).catch(function(){});}
  function loadSparks(){
    fetch(API+'/intraday.json?t='+Date.now(),{cache:'no-store'}).then(function(r){return r.ok?r.json():null;}).then(function(intr){
      METALS.forEach(function(m){
        var pts=intr&&intr.metals&&intr.metals[m.k];
        if(pts&&pts.length>=3)drawSpark(m.k,pts.map(function(p){return p[1];}));
        else fallbackSpark(m);
      });
    }).catch(function(){METALS.forEach(fallbackSpark);});
  }

  // ---- expandable detail chart ----
  function drawChart(host,pts,metal){
    host.innerHTML='<div class="chlabel"></div>';
    if(!pts||pts.length<2)return;
    var w=760,h=300,pad=20,col='var(--'+metal+')';
    var data=pts.map(function(p){return conv(p[1]);}),dates=pts.map(function(p){return p[0];});
    var mn=Math.min.apply(null,data),mx=Math.max.apply(null,data),rg=(mx-mn)||1,n=data.length;
    var X=function(i){return pad+i/(n-1)*(w-2*pad);},Y=function(v){return h-pad-(v-mn)/rg*(h-2*pad);};
    var d='M'+X(0).toFixed(1)+' '+Y(data[0]).toFixed(1);
    for(var i=1;i<n;i++){var x0=X(i-1),y0=Y(data[i-1]),x1=X(i),y1=Y(data[i]),cx=(x0+x1)/2;d+=' C'+cx.toFixed(1)+' '+y0.toFixed(1)+' '+cx.toFixed(1)+' '+y1.toFixed(1)+' '+x1.toFixed(1)+' '+y1.toFixed(1);}
    var area=d+' L'+(w-pad)+' '+(h-pad)+' L'+pad+' '+(h-pad)+' Z',gid='lc'+Math.floor(Math.random()*1e6),grid='';
    for(var g=1;g<=3;g++){var gy=pad+g/4*(h-2*pad);grid+='<line x1="'+pad+'" x2="'+(w-pad)+'" y1="'+gy+'" y2="'+gy+'" stroke="var(--line)" stroke-width="1"/>';}
    host.insertAdjacentHTML('afterbegin','<svg viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none" role="img" aria-label="'+metal+' price chart"><defs><linearGradient id="'+gid+'" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="'+col+'" stop-opacity=".18"/><stop offset="1" stop-color="'+col+'" stop-opacity="0"/></linearGradient></defs>'+grid+'<path d="'+area+'" fill="url(#'+gid+')"/><path d="'+d+'" fill="none" stroke="'+col+'" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/><circle cx="'+X(n-1).toFixed(1)+'" cy="'+Y(data[n-1]).toFixed(1)+'" r="3.4" fill="'+col+'"/><line id="chl" x1="0" x2="0" y1="'+pad+'" y2="'+(h-pad)+'" stroke="var(--line-strong)" stroke-width="1" opacity="0"/></svg>');
    var svg=host.querySelector('svg'),chl=host.querySelector('#chl'),lab=host.querySelector('.chlabel');
    function mv(ev){var r=svg.getBoundingClientRect(),cx=(ev.touches?ev.touches[0].clientX:ev.clientX),rel=Math.max(0,Math.min(1,(cx-r.left)/r.width)),idx=Math.round(rel*(n-1)),vx=X(idx),vy=Y(data[idx]);chl.setAttribute('x1',vx);chl.setAttribute('x2',vx);chl.setAttribute('opacity','1');lab.style.opacity='1';lab.style.left=(vx/w*100)+'%';lab.style.top=(vy/h*100)+'%';lab.textContent=dates[idx]+' · '+fmt(data[idx]);}
    function lv(){chl.setAttribute('opacity','0');lab.style.opacity='0';}
    svg.addEventListener('mousemove',mv);svg.addEventListener('touchmove',mv,{passive:true});svg.addEventListener('mouseleave',lv);svg.addEventListener('touchend',lv);
  }
  function loadChart(metal){
    var p=document.querySelector('[data-panel="'+metal+'"]');var host=p.querySelector('.chart');if(!host)return;
    fetch(API+'/history/'+metal+'-'+(HR[range]||'1y')+'.json').then(function(r){return r.ok?r.json():null;}).then(function(f){if(f&&f.points)drawChart(host,f.points,metal);}).catch(function(){});
  }
  function buildPanel(metal){
    var p=document.querySelector('[data-panel="'+metal+'"]');
    p.innerHTML='<div class="pmeta"></div>'
      +'<span class="ranges" role="group" aria-label="Range"><button data-r="1m">1M</button><button data-r="1y" aria-pressed="true">1Y</button><button data-r="5y">5Y</button><button data-r="max">MAX</button></span>'
      +'<div class="chart"><div class="chlabel"></div></div>'
      +'<a class="deeper" href="'+(API||'https://preciousmetalscharts.com')+'/'+metal+'-price">Open full chart &amp; 50-year history →</a>'
      +'<p class="pnote">Chart in '+cur+' per '+unitLabel()+' · history from our own archive'+(cur!=='USD'?', shown at today\'s exchange rate':'')+'.</p>';
    p.querySelector('.ranges').addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;range=b.dataset.r;Array.prototype.forEach.call(this.querySelectorAll('button'),function(x){x.setAttribute('aria-pressed',x.dataset.r===range?'true':'false');});loadChart(metal);});
    renderPanelMeta(metal);
    loadChart(metal);
  }

  // ---- interactions ----
  id('rows').addEventListener('click',function(e){
    var btn=e.target.closest('.row');if(!btn)return;var k=btn.getAttribute('data-k');
    document.querySelectorAll('.row').forEach(function(r){r.classList.toggle('open',r===btn&&open!==k);r.setAttribute('aria-expanded',r===btn&&open!==k?'true':'false');});
    document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('show');});
    if(open===k){open=null;return;}
    open=k;range='1y';
    var p=document.querySelector('[data-panel="'+k+'"]');p.classList.add('show');buildPanel(k);
  });
  id('curSel').addEventListener('change',function(){cur=this.value;try{localStorage.setItem('pmc_live_cur',cur);}catch(e){}fmtCache={};renderAll();if(open){buildPanel(open);}});
  id('unitSeg').addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;unit=b.getAttribute('data-u');try{localStorage.setItem('pmc_live_unit',unit);}catch(e){}Array.prototype.forEach.call(this.querySelectorAll('button'),function(x){x.setAttribute('aria-pressed',x.getAttribute('data-u')===unit?'true':'false');});renderAll();if(open){buildPanel(open);}});
  (function(){var b=document.querySelector('#unitSeg [data-u="'+unit+'"]');if(b){Array.prototype.forEach.call(document.querySelectorAll('#unitSeg button'),function(x){x.setAttribute('aria-pressed','false');});b.setAttribute('aria-pressed','true');}})();

  // theme
  var sun='<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>',moon='<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>';
  function setIcon(){id('themeIcon').innerHTML=document.documentElement.getAttribute('data-theme')==='dark'?moon:sun;}
  id('themeBtn').addEventListener('click',function(){var n=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',n);try{localStorage.setItem('pmc_live_theme',n);}catch(e){}setIcon();});
  setIcon();

  var fetchFail=false;
  function setFresh(){var when=snap?new Date(snap.updatedAt):null,hhmm=when&&!isNaN(when.getTime())?when.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'';
    var ageMin=when&&!isNaN(when.getTime())?(Date.now()-when.getTime())/60000:null,stale=false,txt;
    if(fetchFail){txt=(hhmm?(hhmm+' · '):'')+'refresh failed — tap to retry';stale=true;}
    else if(ageMin!=null&&ageMin>20){var h=Math.floor(ageMin/60),m=Math.round(ageMin%60);txt=(hhmm?(hhmm+' · '):'')+'updated '+(h>0?(h+'h '+m+'m'):Math.round(ageMin)+' min')+' ago · tap to refresh';stale=true;}
    else{txt=(hhmm?(hhmm+' · '):'')+'~'+((snap&&snap.delayedMinutes)||10)+' min delayed';}
    var el=id('fresh');if(el){el.textContent=txt;el.classList.toggle('stale',stale);}
    var rd=document.querySelector('.status .redot');if(rd)rd.style.background=stale?'var(--down)':'var(--up)';}
  function loadPrices(){fetch(API+'/prices.json?t='+Date.now(),{cache:'no-store'}).then(function(r){return r.ok?r.json():null;}).then(function(s){if(!s){fetchFail=true;setFresh();return;}fetchFail=false;snap=s;if(s.fx&&s.fx.rates)rates=s.fx.rates;else if(s.fx&&s.fx.eur){rates={USD:1,EUR:s.fx.eur};}if(!rates.USD)rates.USD=1;
    if(!rates[cur]){cur='USD';id('curSel').value='USD';}
    renderAll();setFresh();}).catch(function(){fetchFail=true;setFresh();});}
  loadPrices();setInterval(loadPrices,60000);
  loadSparks();setInterval(loadSparks,300000);
  document.addEventListener('visibilitychange',function(){if(!document.hidden){loadPrices();loadSparks();}});
  window.addEventListener('pageshow',function(){loadPrices();});
  window.addEventListener('focus',function(){loadPrices();});
  (function(){var fr=id('fresh');if(fr){fr.style.cursor='pointer';fr.setAttribute('role','button');fr.setAttribute('tabindex','0');fr.setAttribute('aria-label','Refresh prices');fr.addEventListener('click',function(){loadPrices();loadSparks();});}})();
  if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(function(rs){rs.forEach(function(r){r.update();r.unregister();});}).catch(function(){});if(window.caches&&caches.keys){caches.keys().then(function(ks){ks.forEach(function(k){caches.delete(k);});}).catch(function(){});}}
})();
</script>
</body>
</html>
